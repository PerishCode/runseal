[resources]
root = ".local"

[deno]
config = ".runseal/deno.json"
lock = "deno.lock"
permissions = [
  "--allow-read=.",
  "--allow-write=.",
  "--allow-env",
  "--allow-net",
  "--allow-run=git,gh,cargo,flavor,sh,bash,pwsh,python3,deno,runseal",
]

[[injections]]
type = "env"

[injections.vars]
RUNSEAL_REPO_LOCAL_DIR = "resource://"
RUNSEAL_REPO_SECRETS_DIR = "resource://secrets"
RUNSEAL_REPO_TMP_DIR = "resource://tmp"
