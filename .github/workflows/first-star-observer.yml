name: First Star Observer

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Observation window (1-14 days)"
        required: false
        default: "7"
  schedule:
    - cron: "0 2 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  observe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run first-star observer
        env:
          GITHUB_TOKEN: ${{ secrets.FIRST_STAR_GH_TOKEN || secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          DAYS="${{ github.event.inputs.days || '7' }}"
          python3 scripts/observe_first_star.py --days "$DAYS" --json > first-star-report.json

      - name: Detect conversion event
        id: detect
        run: |
          python3 - <<'PY'
          import json
          import os

          with open("first-star-report.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          stars_total = int(data.get("metrics", {}).get("stars_total") or 0)
          stars_new = int(data.get("metrics", {}).get("stars_new_7d") or 0)
          first_star_reached = stars_total >= 1

          output_path = os.environ["GITHUB_OUTPUT"]
          with open(output_path, "a", encoding="utf-8") as out:
              out.write(f"stars_total={stars_total}\n")
              out.write(f"stars_new_7d={stars_new}\n")
              out.write(f"first_star_reached={'true' if first_star_reached else 'false'}\n")
          PY

      - name: Record first-star conversion issue
        if: steps.detect.outputs.first_star_reached == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          STARS_TOTAL: ${{ steps.detect.outputs.stars_total }}
          STARS_NEW_7D: ${{ steps.detect.outputs.stars_new_7d }}
        run: |
          DATE="$(date -u +%F)"
          TITLE="[CVR][first_star_reached] ${REPO} | ${DATE}"
          EXISTS="$(gh issue list --repo "$REPO" --state all --search "[CVR][first_star_reached] ${REPO} in:title" --json number --jq '.[0].number')"
          if [ -n "$EXISTS" ]; then
            echo "first-star issue already exists: #$EXISTS"
            exit 0
          fi

          gh issue create --repo "$REPO" --title "$TITLE" --body "$(cat <<EOF
          ## Event
          - name: first_star_reached
          - occurred_at: $(date -u +%Y-%m-%dT%H:%M:%SZ)

          ## Metrics Snapshot
          - stars_total: ${STARS_TOTAL}
          - stars_new_7d: ${STARS_NEW_7D}

          ## Evidence
          - workflow run: ${RUN_URL}

          ## Notes
          - This record is auto-generated by \\`first-star-observer.yml\\`.
          EOF
          )"

      - name: Publish summary
        run: |
          python3 - <<'PY' >> "$GITHUB_STEP_SUMMARY"
          import json

          with open("first-star-report.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          print("## First-Star Observability")
          print(f"- Repo: `{data['repo']}`")
          print(f"- Window: `{data['window_days']}d`")
          print(f"- Score: `{data['weekly_score_0_100']}/100`")
          print(f"- Mode: `{data['mode']}`")
          print(f"- Confidence: `{data['confidence']}`")

          metrics = data.get("metrics", {})
          print("- Metrics:")
          print(f"  - views_7d: `{metrics.get('views_count_7d')}`")
          print(f"  - visitors_7d_proxy: `{metrics.get('visitors_7d_proxy')}`")
          print(f"  - clones_7d_uniques_proxy: `{metrics.get('clones_uniques_7d_proxy')}`")
          print(f"  - stars_total: `{metrics.get('stars_total')}`")
          print(f"  - stars_new_7d: `{metrics.get('stars_new_7d')}`")

          warnings = data.get("warnings", [])
          if warnings:
              print("- Warnings:")
              for w in warnings:
                  print(f"  - {w}")
          PY

      - name: Upload observer artifact
        uses: actions/upload-artifact@v4
        with:
          name: first-star-report
          path: first-star-report.json
