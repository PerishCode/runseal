name: guard

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: guard-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  guard:
    name: guard (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Format
        if: runner.os != 'Windows'
        run: |
          set -euo pipefail
          curl -fsSL https://flavor.perish.uk/manage.sh -o "$RUNNER_TEMP/manage-flavor.sh"
          sh "$RUNNER_TEMP/manage-flavor.sh" install --bin-dir "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install Flavor
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $binDir = Join-Path $env:USERPROFILE '.local\bin'
          Invoke-WebRequest -Uri https://flavor.perish.uk/manage.ps1 -OutFile (Join-Path $env:RUNNER_TEMP 'manage-flavor.ps1')
          & (Join-Path $env:RUNNER_TEMP 'manage-flavor.ps1') install --bin-dir $binDir
          $binDir | Out-File -Append -Encoding utf8 $env:GITHUB_PATH

      - name: Guard
        shell: bash
        run: |
          set -euo pipefail
          cargo build --quiet --locked -p runseal
          exe=runseal
          if [ "${RUNNER_OS:-}" = "Windows" ]; then
            exe=runseal.exe
          fi
          bin_dir="$PWD/.local/tmp/ci-guard-bin"
          mkdir -p "$bin_dir"
          cp "target/debug/$exe" "$bin_dir/$exe"
          PATH="$bin_dir:$PWD/target/debug:$PATH" "$bin_dir/$exe" :guard
